hard_gates:
  max_drawdown: 0.20
  min_data_years: 3
  required_assumptions:
    - slippage
    - commission
    - tax
    - dividend_withholding

yellow_flags:
  max_drawdown_warning_range: [0.15, 0.20]
  suspiciously_high_cagr: 0.40
  param_sensitivity_threshold: 0.50
  first_live_deployment: true

weights:
  cagr: 0.35
  max_dd: 0.35
  sharpe: 0.20
  turnover: 0.10
  adjust_range: 0.10

limits:
  max_debate_rounds: 2
  max_iterations: 3
  on_max_reached: STOP_AND_NOTIFY_HUMAN

# 生产运行前请设置:
# export TUSHARE_TOKEN="your-token"
data_source:
  provider: "tushare"
  fallback:
    - "akshare"
    - "stooq"
  cache_enabled: true
  cache_path: "data/market_data_cache.db"

strategy:
  mode: "auto"  # auto | manual
  enabled:
    - "ma_cross"
    - "rsi"
    - "macd"
    - "mean_reversion"
    - "channel_breakout"
  manual_primary: "ma_cross"
  default_params:
    ma_cross:
      short_window: 10
      long_window: 30
    rsi:
      period: 14
      oversold: 30
      overbought: 70
    macd:
      fast_period: 12
      slow_period: 26
      signal_period: 9
    mean_reversion:
      z_window: 20
      entry_threshold: 2.0
      exit_threshold: 0.5
      use_short: false
    channel_breakout:
      channel_window: 20
      atr_window: 14
      atr_k: 2.0
      use_stop_loss: true

universe:
  mode: "dynamic_cn"  # dynamic_cn | static
  top_n: 20
  min_list_days: 120
  exclude_st: true
  include_gem: true

execution_rules:
  allow_short: false
  cn_lot_size: 100
  cn_t_plus_one: true

scheduler:
  enabled: true
  run_time: "15:10"
  timezone: "Asia/Shanghai"

# dynamic_cn 模式下，portfolio.symbols 仅作为回退池
portfolio:
  symbols:
    - "000300.SH"  # 沪深300指数
    - "510300.SH"  # 沪深300ETF
    - "159915.SZ"  # 创业板ETF
  default_capital: 1000000

# 当前模板默认只做模拟/研究，不接A股实盘券商
broker:
  type: paper
  mode: dry_run
  max_order_value: 500000
  require_confirm_live: true

notifications:
  telegram:
    enabled: false
    chat_id: ""
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    from_addr: ""
    to_addrs: []

trading_costs:
  slippage_bps: 5
  commission_rate: 0.0003
  tax_rate: 0.001
  dividend_withholding: 0.0

agent_risk:
  max_single_position_ratio: 0.10
  max_daily_loss_ratio: -0.03
  stop_loss_ratio: -0.08
  take_profit_ratio: 0.15
  trailing_stop_ratio: 0.05
  max_total_position_ratio: 0.80
  min_cash_ratio: 0.05
  max_daily_orders: 30
  cooldown_seconds: 60
