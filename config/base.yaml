# quant-trader base configuration
# [Source 来源] repository default baseline shared by all local environments
# [Purpose 用途] centralize non-secret defaults and keep runtime behavior reproducible

# [Source 来源] repository default
# [Purpose 用途] identify runtime environment and global timezone
app_name: quant-trader
env: local
timezone: Asia/Shanghai

# [Source 来源] repository default
# [Purpose 用途] runtime artifact locations and SQLAlchemy connection target
storage:
  # [Source 来源] base.yaml, can be overridden by env DATABASE_URL
  # [Purpose 用途] primary application database (SQLite now, PostgreSQL-ready)
  database_url: sqlite:///var/db/quant_trader.db
  # [Source 来源] base.yaml, can be overridden by env RUNTIME_DB_PATH
  # [Purpose 用途] legacy trading db path used by existing orchestrator modules
  runtime_db_path: var/db/trading.db
  # [Source 来源] base.yaml, can be overridden by env PAPER_DB_PATH
  # [Purpose 用途] legacy paper trading db path
  paper_db_path: var/db/paper_trading.db
  # [Source 来源] base.yaml, can be overridden by env MARKET_CACHE_PATH
  # [Purpose 用途] market data cache sqlite file
  market_cache_path: var/cache/market_data_cache.db
  # [Source 来源] base.yaml, can be overridden by env APP_LOG_PATH
  # [Purpose 用途] backend default log file path
  log_path: var/logs/quant_trader.log

# [Source 来源] repository default
# [Purpose 用途] broker mode and execution constraints
broker:
  type: paper
  mode: dry_run
  max_order_value: 500000
  require_confirm_live: true

# [Source 来源] repository default
# [Purpose 用途] scheduling runtime for daily strategy orchestration
scheduler:
  enabled: true
  run_time: "15:10"
  timezone: Asia/Shanghai

# [Source 来源] repository default
# [Purpose 用途] market data provider selection and cache control
data_source:
  provider: akshare
  fallback:
    - stooq
  cache_enabled: true

# [Source 来源] repository default
# [Purpose 用途] strategy selection and default parameter templates
strategy:
  mode: auto
  enabled:
    - ma_cross
    - rsi
    - macd
    - mean_reversion
    - channel_breakout
  manual_primary: ma_cross
  default_params:
    ma_cross:
      short_window: 10
      long_window: 30

# [Source 来源] repository default
# [Purpose 用途] stock universe selection policy
universe:
  mode: dynamic_cn
  top_n: 20
  min_list_days: 120
  exclude_st: true
  include_gem: true

# [Source 来源] repository default
# [Purpose 用途] execution constraints for Chinese market rules
execution_rules:
  allow_short: false
  cn_lot_size: 100
  cn_t_plus_one: true

# [Source 来源] repository default
# [Purpose 用途] fallback static portfolio used when dynamic universe unavailable
portfolio:
  symbols:
    - "000300.SH"
    - "510300.SH"
    - "159915.SZ"
  default_capital: 1000000

# [Source 来源] repository default
# [Purpose 用途] outbound notification channels (content only, no hardcoded secrets)
notifications:
  telegram:
    enabled: false
    chat_id: ""
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    from_addr: ""
    to_addrs: []

# [Source 来源] repository default
# [Purpose 用途] transaction cost assumptions for backtest and risk review
trading_costs:
  slippage_bps: 5
  commission_rate: 0.0003
  tax_rate: 0.001
  dividend_withholding: 0.0

# [Source 来源] repository default
# [Purpose 用途] hard stop requirements for risk gate
hard_gates:
  max_drawdown: 0.20
  min_data_years: 3
  required_assumptions:
    - slippage
    - commission
    - tax
    - dividend_withholding

# [Source 来源] repository default
# [Purpose 用途] warning-level thresholds for strategy approval
yellow_flags:
  max_drawdown_warning_range: [0.15, 0.20]
  suspiciously_high_cagr: 0.40
  param_sensitivity_threshold: 0.50
  first_live_deployment: true

# [Source 来源] repository default
# [Purpose 用途] utility score weighting model
weights:
  cagr: 0.35
  max_dd: 0.35
  sharpe: 0.20
  turnover: 0.10
  adjust_range: 0.10

# [Source 来源] repository default
# [Purpose 用途] runtime guardrails for debate and iterative optimization
limits:
  max_debate_rounds: 2
  max_iterations: 3
  on_max_reached: STOP_AND_NOTIFY_HUMAN

# [Source 来源] local.env / shell env recommended
# [Purpose 用途] integration credentials, loaded from env override first
integrations:
  minimax_api_key: ""
  twelve_data_api_key: ""
  tushare_token: ""
  alphavantage_api_key: ""
  itick_token: ""
  longbridge_app_key: ""
  longbridge_app_secret: ""
  longbridge_access_token: ""
