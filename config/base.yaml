# OpenHamster base configuration
# [Source 来源] repository default baseline shared by all local environments
# [Purpose 用途] centralize non-secret defaults for the auditable strategy factory

# [Source 来源] repository default
# [Purpose 用途] identify application name, environment, and timezone
app_name: OpenHamster
env: local
timezone: Asia/Shanghai

# [Source 来源] repository default
# [Purpose 用途] runtime artifact locations and SQLAlchemy connection target
storage:
  # [Source 来源] base.yaml, can be overridden by env DATABASE_URL
  # [Purpose 用途] primary application database, SQLite now and PostgreSQL-ready later
  database_url: sqlite:///var/db/openhamster.db
  # [Source 来源] base.yaml, can be overridden by env RUNTIME_DB_PATH
  # [Purpose 用途] local runtime database storing paper NAV, orders, and positions snapshots
  runtime_db_path: var/db/trading.db
  # [Source 来源] base.yaml, can be overridden by env PAPER_DB_PATH
  # [Purpose 用途] legacy-compatible paper snapshot database path still read by the dashboard
  paper_db_path: var/db/paper_trading.db
  # [Source 来源] base.yaml, can be overridden by env RUNTIME_STATE_DB_PATH
  # [Purpose 用途] high-frequency runtime state store for heartbeat, llm status, and universe selection
  runtime_state_db_path: var/db/runtime_state.db
  # [Source 来源] base.yaml, can be overridden by env MARKET_CACHE_PATH
  # [Purpose 用途] local market data cache sqlite file
  market_cache_path: var/cache/market_data_cache.db
  # [Source 来源] base.yaml, can be overridden by env APP_LOG_PATH
  # [Purpose 用途] backend application log path
  log_path: var/logs/openhamster.log

# [Source 来源] repository default
# [Purpose 用途] price and volume data provider selection
data_source:
  provider: akshare
  fallback:
    - stooq
  cache_enabled: true

# [Source 来源] repository default
# [Purpose 用途] macro event pipeline used as a low-frequency research background input
events:
  macro_provider: fred
  fallback_mode: reuse_last_good
  fallback_max_age_days: 14
  expected_sync_interval_minutes: 60

# [Source 来源] repository default
# [Purpose 用途] default LLM provider and generation limits for agent outputs
llm:
  provider: minimax
  model: MiniMax-M2.7
  temperature: 0.3
  max_output_tokens: 4096
  request_timeout_seconds: 60.0
  retry_attempts: 2
  retry_backoff_seconds: 2.0

# [Source 来源] repository default
# [Purpose 用途] strategy registry, human baseline strategies, and default parameters
strategy:
  mode: auto
  enabled:
    - ma_cross
    - rsi
    - macd
    - mean_reversion
    - channel_breakout
  manual_primary: ma_cross
  default_params:
    ma_cross:
      short_window: 10
      long_window: 30

# [Source 来源] repository default
# [Purpose 用途] stock universe selection policy
universe:
  mode: dynamic_hk
  top_n: 20
  research_batch_size: 5
  min_list_days: 120
  exclude_st: true
  include_gem: true
  min_turnover_millions: 200.0
  max_lot_cost_ratio: 0.25

# [Source 来源] repository default
# [Purpose 用途] execution safety boundaries for the B-level autonomy model
execution_rules:
  allow_short: false
  cn_lot_size: 100
  cn_t_plus_one: false

# [Source 来源] repository default
# [Purpose 用途] fallback static portfolio used when dynamic universe is unavailable
portfolio:
  symbols:
    - "2800.HK"
  default_capital: 100000
  base_currency: HKD

# [Source 来源] repository default
# [Purpose 用途] transaction cost assumptions for backtest and risk review
trading_costs:
  slippage_bps: 5
  commission_rate: 0.0003
  tax_rate: 0.001
  dividend_withholding: 0.0

# [Source 来源] repository default
# [Purpose 用途] deterministic hard gates for RiskManagerAgent
hard_gates:
  max_drawdown: 0.15
  min_data_years: 3
  required_assumptions:
    - slippage
    - commission
    - tax
    - dividend_withholding

# [Source 来源] repository default
# [Purpose 用途] warning-level thresholds before strategy promotion or rollback
yellow_flags:
  max_drawdown_warning_range: [0.12, 0.15]
  suspiciously_high_cagr: 0.40
  param_sensitivity_threshold: 0.50
  first_live_deployment: true

# [Source 来源] repository default
# [Purpose 用途] explicit governance rules for promotion, cooldown, pause, and rollback decisions
governance:
  promote_threshold: 75.0
  keep_threshold: 68.0
  challenger_min_delta: 3.0
  paper_slot_count: 3
  cooldown_days: 5
  require_backtest_before_paper: true
  candidate_retention_limit: 24
  candidate_max_age_days: 14
  rejected_retention_days: 3
  live_drawdown_pause: 0.12
  live_drawdown_rollback: 0.15
  acceptance_min_days: 7
  acceptance_min_fill_rate: 0.60
  acceptance_max_drawdown: 0.08
  block_promotion_on_macro_degrade: true

# [Source 来源] repository default
# [Purpose 用途] deterministic score weighting used by evidence review
weights:
  cagr: 0.35
  max_dd: 0.35
  sharpe: 0.20
  turnover: 0.10

# [Source 来源] repository default
# [Purpose 用途] guardrails for debate cycles and iterative optimization
limits:
  max_debate_rounds: 2
  max_iterations: 3

# [Source 来源] local.env / shell env recommended
# [Purpose 用途] integration credentials injected into providers and agent services
integrations:
  minimax_api_key: ""
  fred_api_key: ""
  twelve_data_api_key: ""
  tushare_token: ""
  minshare_2k_token: ""
  minshare_hk_daily_token: ""
  minshare_hk_rt_token: ""
  alphavantage_api_key: ""
  itick_token: ""
