# 模拟盘配置示例
# 复制为 config/paper_trading.yaml 并修改参数

# 交易标的
symbol: "2800.HK"

# 初始资金 (HKD)
initial_capital: 1000000

# 数据源 (akshare / stooq)
provider: "stooq"

# 备用数据源
fallback:
  - "stooq"

# 策略参数
strategy:
  name: "ma_cross"
  short_window: 5
  long_window: 20

# 执行时间 (每日 HH:MM)
schedule_time: "18:00"

# 数据库路径
db_path: "data/paper_trading.db"

# 手续费率
commission_rate: 0.001

# 通知配置
notify:
  # 通知渠道: wecom / email / both
  channels:
    - wecom

  # 企业微信配置
  wecom:
    webhook_url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_KEY"

  # 邮件配置 (可选)
  # email:
  #   smtp_host: "smtp.qq.com"
  #   smtp_port: 465
  #   sender: "your@qq.com"
  #   password: "YOUR_AUTH_CODE"
  #   receivers:
  #     - "target@email.com"
