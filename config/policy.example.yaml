# 策略与风控配置示例
# 复制为 config/policy.yaml 并修改参数

hard_gates:
  max_drawdown: 0.20
  min_data_years: 3
  required_assumptions:
    - slippage
    - commission
    - tax
    - dividend_withholding

yellow_flags:
  max_drawdown_warning_range: [0.15, 0.20]
  suspiciously_high_cagr: 0.40
  param_sensitivity_threshold: 0.50
  first_live_deployment: true

weights:
  cagr: 0.35
  max_dd: 0.35
  sharpe: 0.20
  turnover: 0.10
  adjust_range: 0.10

limits:
  max_debate_rounds: 2
  max_iterations: 3
  on_max_reached: STOP_AND_NOTIFY_HUMAN

# 调度器配置
scheduler:
  enabled: true
  run_time: "15:30"
  timezone: "Asia/Hong_Kong"

# 数据源配置
data_source:
  provider: "stooq"
  fallback:
    - "stooq"
  cache_enabled: true
  cache_path: "data/market_data_cache.db"

# 策略配置（自由化）
strategy:
  mode: "auto"  # auto | manual
  enabled:
    - "ma_cross"
    - "rsi"
    - "macd"
    - "mean_reversion"
    - "channel_breakout"
  manual_primary: "ma_cross"
  default_params:
    ma_cross:
      short_window: 5
      long_window: 20

# 动态选股配置
universe:
  mode: "dynamic_cn"  # dynamic_cn | static
  top_n: 20
  min_list_days: 120
  exclude_st: true
  include_gem: true

# 交易执行约束
execution_rules:
  allow_short: false
  cn_lot_size: 100
  cn_t_plus_one: true

# 目标持仓列表
portfolio:
  symbols:
    - "2800.HK"  # 恒生指数 ETF
    - "0700.HK"  # 腾讯
    - "9988.HK"  # 阿里巴巴
  default_capital: 1000000  # 每只股票默认资金

# 券商配置
broker:
  type: longbridge
  mode: dry_run  # readonly / dry_run / live
  max_order_value: 5000  # 单笔最大下单金额 (HKD)
  require_confirm_live: true  # live 模式启动时需要确认

# 通知配置 (敏感信息运行时注入)
notifications:
  telegram:
    enabled: false
    chat_id: ""  # 你的 Telegram chat_id
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    from_addr: ""
    to_addrs: []

# 交易成本假设 (BacktestEngine 使用)
trading_costs:
  slippage_bps: 5        # 滑点 (basis points, 5 = 0.05%)
  commission_rate: 0.001 # 佣金率 (0.1%)
  tax_rate: 0.001        # 印花税率 (0.1%, 美股为0)
  dividend_withholding: 0.15 # 股息预扣税率 (15%)
