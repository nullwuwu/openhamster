name: Feature request
description: Propose a product or developer-experience improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator or developer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change and why it fits the current product boundary.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: Call out any legacy path, runtime, or config concerns.
